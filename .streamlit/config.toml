[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = true
enableXsrfProtection = true
runOnSave = false

[server.fileWatcherType]
# Deshabilitar file watcher para mejorar rendimiento en Streamlit Cloud
type = "none"

[browser]
gatherUsageStats = false

